<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HantiMaster - Premium Property Management</title>
    <script>
      // Suppress Vite WebSocket errors which are expected in this environment
      const originalError = console.error;
      console.error = (...args) => {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('[vite] failed to connect to websocket')) {
          return;
        }
        originalError.apply(console, args);
      };
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && (event.reason.message?.includes('WebSocket closed without opened') || event.reason === 'WebSocket closed without opened.')) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
